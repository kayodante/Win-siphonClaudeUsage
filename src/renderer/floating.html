<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'none';" />
    <title>Siphon Widget</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="floating-body">
    <main class="floating-widget" aria-label="Siphon floating widget">
      <header class="floating-header">
        <div class="floating-title">
          <img class="floating-logo" src="../../assets/tray.png" alt="" aria-hidden="true" />
          <span class="floating-label" id="floatingTitleLabel"></span>
        </div>
        <div class="floating-actions">
          <button id="floatingRefreshButton" class="floating-action-btn">
            <!-- Carbon: Restart -->
            <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M26,18A10,10,0,1,1,16,8h6.1821l-3.5844,3.5854L20,13l6-6L20,1,18.5977,2.414,22.1851,6H16A12,12,0,1,0,28,18Z"/></svg>
          </button>
          <button id="floatingCloseButton" class="floating-action-btn">
            <!-- Carbon: CloseLarge -->
            <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M17.4141 16L26 7.4141 24.5859 6 16 14.5859 7.4143 6 6 7.4141 14.5859 16 6 24.5859 7.4143 26 16 17.4141 24.5859 26 26 24.5859 17.4141 16z"/></svg>
          </button>
        </div>
      </header>
      <div class="floating-info">
        <button id="floatingOpenButton" class="floating-percent-button">
          <span class="floating-percent" id="floatingPercent">--</span>
        </button>
        <span class="floating-reset" aria-live="polite">
          <span id="floatingResetLabel" class="floating-reset-label"></span><span id="floatingResetTime" class="floating-reset-time"></span>
        </span>
      </div>
      <div id="floatingMeter" class="floating-meter-bar" aria-hidden="true"></div>
    </main>

    <script type="module" src="./floating.js"></script>
  </body>
</html>
