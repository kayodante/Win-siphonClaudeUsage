appId: com.kayodantes.siphon
productName: Siphon
afterAllArtifactBuild: scripts/after-build.cjs
directories:
  output: dist
  buildResources: assets/installer
files:
  - src/**/*
  - assets/**/*
  - package.json
  - "!test/**"
  - "!scripts/**"
  - "!docs/**"
  - "!ROADMAP.md"
  - "!ARCHITECTURE.md"
asarUnpack:
  - assets/installer/icon.ico
win:
  target:
    - target: nsis
    - target: portable
  icon: assets/installer/icon.ico
portable:
  artifactName: Siphon-Portable-${version}.exe
nsis:
  artifactName: Siphon.Setup.${version}.exe
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/installer/icon.ico
  uninstallerIcon: assets/installer/icon.ico
  installerSidebar: assets/installer/installer-sidebar.bmp
  installerHeader: assets/installer/installer-header.bmp
  shortcutName: Siphon
  createStartMenuShortcut: true
  createDesktopShortcut: false
  include: assets/installer/installer.nsh
