name: Feature Request
description: Suggest an idea or improvement for Siphon
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. See `ROADMAP.md` first — it might already be planned.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like Siphon to do?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem it solves
      description: What's the underlying problem or use case this addresses?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you're using today, or other approaches you thought about.
