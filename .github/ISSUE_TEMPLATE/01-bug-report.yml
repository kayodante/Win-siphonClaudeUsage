name: Bug Report
description: Report something that isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in as much detail as you can — it makes a fix much faster.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
      placeholder: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro-steps
    attributes:
      label: Steps to reproduce
      description: How can we see this happen ourselves?
      placeholder: |
        1. Open Siphon
        2. Click on...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: input
    id: siphon-version
    attributes:
      label: Siphon version
      description: Found in the tray menu or the installer filename.
      placeholder: "1.4.6"
    validations:
      required: true
  - type: input
    id: windows-version
    attributes:
      label: Windows version
      description: Settings → System → About, or `winver`.
      placeholder: "Windows 11 24H2"
    validations:
      required: true
  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      description: Affects where to look for a fix — installer/portable bugs and winget lag are handled differently.
      options:
        - Installer (Siphon Setup .exe)
        - Portable (Siphon-Portable .exe)
        - winget
        - Built from source
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Additional context / logs
      description: Anything else that might help — screenshots, console output, etc. Do not paste OAuth tokens or credentials.
