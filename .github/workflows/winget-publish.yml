name: Publish to winget

on:
  release:
    types: [published]

jobs:
  winget:
    runs-on: windows-latest
    steps:
      - name: Compute version and installer URL
        id: vars
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}".TrimStart('v')
          $url = "https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/Siphon.Setup.$version.exe"
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "url=$url" >> $env:GITHUB_OUTPUT

      - name: Install wingetcreate
        shell: pwsh
        run: iwr https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

      - name: Submit updated manifest to winget-pkgs
        shell: pwsh
        run: |
          .\wingetcreate.exe update kayodante.Siphon `
            --version ${{ steps.vars.outputs.version }} `
            --urls "${{ steps.vars.outputs.url }}" `
            --submit `
            --token ${{ secrets.WINGET_TOKEN }}
