name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  # Rust core logic (parsing, pricing, PKCE, quota, preferences, scheduler).
  # Cross-platform and free of Tauri/Windows deps, so it runs fast on Linux.
  rust-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Format check
        working-directory: src-tauri/crates/siphon-core
        run: cargo fmt --check

      - name: Clippy
        working-directory: src-tauri/crates/siphon-core
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        working-directory: src-tauri/crates/siphon-core
        run: cargo test
